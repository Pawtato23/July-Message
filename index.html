<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>July Letter</title>

<style>
* {
  box-sizing: border-box;
  font-family: Georgia, serif;
}

body {
  margin: 0;
  min-height: 100vh;
  background: linear-gradient(135deg, #ffd6e8, #fff4ec);
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(6px);
  opacity: 0;
  pointer-events: none;
  transition: 0.6s ease;
  z-index: 8;
}

.overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.flower-bg {
  position: fixed;
  inset: 0;
  z-index: 1;
  transition: 0.6s ease;
}

.flower-bg.dim {
  opacity: 0.35;
  filter: blur(2px);
}

.flower{
    position:absolute;
    cursor:pointer;
    animation:float 5s ease-in-out infinite;
    transition:.3s;
    user-select:none;
    filter:drop-shadow(0 6px 8px rgba(0,0,0,.15));
}

.flower:nth-child(1){font-size:48px;}
.flower:nth-child(2){font-size:42px;}
.flower:nth-child(3){font-size:46px;}
.flower:nth-child(4){font-size:38px;}
.flower:nth-child(5){font-size:44px;}
.flower:nth-child(6){font-size:36px;}
.flower:hover {
  transform: scale(1.35) rotate(15deg);
}

@keyframes float {
  0%,100%{
    transform: translateY(0);
  }

  50%{
    transform: translateY(-8px);
  }
}
.main {
  position: relative;
  z-index: 3;
  text-align: center;
  transition: 0.6s ease;
}

.main.dim {
  opacity: 0.45;
  filter: blur(2px);
}

.envelope {
  width: 330px;
  height: 220px;
  background: linear-gradient(145deg, #d85f87, #f29ab2);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  box-shadow: 0 20px 45px rgba(0,0,0,0.25);
  transition: 0.4s ease;
}

.envelope:hover {
  transform: translateY(-8px);
}

.envelope::before {
  content: "♡";
  position: absolute;
  top: 80px;
  left: 145px;
  font-size: 42px;
  color: rgba(255,255,255,0.65);
  z-index: 6;
}

.flap {
  position: absolute;
  inset: 0 0 auto 0;
  width: 100%;
  height: 120px;
  background: linear-gradient(145deg, #d66890, #bc4d73);
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  border-radius: 12px 12px 0 0;
  box-shadow:
    inset 0 8px 15px rgba(255,255,255,.15),
    inset 0 -8px 10px rgba(0,0,0,.12);
  transform-origin: top;
  transition: .9s ease;
  z-index: 5;
}

.envelope.open .flap {
  transform: rotateX(180deg);
  z-index: 1;
}

.front {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 125px;
  background: linear-gradient(145deg, #e781a0, #f4aac0);
  border-radius: 0 0 12px 12px;
  z-index: 4;
}

.front::before {
  content: "";
  position: absolute;
  inset: 0;
  background:
    linear-gradient(135deg, transparent 49%, rgba(255,255,255,0.25) 50%, transparent 51%),
    linear-gradient(45deg, transparent 49%, rgba(255,255,255,0.18) 50%, transparent 51%);
}

.letter {
  position: fixed;
  left: 50%;
  top: 50%;
  width: min(750px, 92vw);
  height: min(760px, 90vh);
  background: #fffaf2;
  border: 2px solid #f0c7b5;
  border-radius: 20px;
  padding: 55px 55px 90px;
  box-shadow: 0 25px 60px rgba(0,0,0,.35);
  transform: translate(-50%,-42%) scale(.65);
  opacity: 0;
  transition: .8s;
  z-index: 20;
  pointer-events: none;
  display: flex;
  flex-direction: column;
}

.letter.show {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
  pointer-events: auto;
}

.letter::before {
  content: "✿";
  position: absolute;
  top: 16px;
  left: 20px;
  color: #d85f87;
  font-size: 24px;
}

.letter::after {
  content: "♡";
  position: absolute;
  bottom: 16px;
  right: 22px;
  color: #d85f87;
  font-size: 24px;
}

.paper-design {
  position: absolute;
  inset: 14px;
  border: 1px dashed #e9b7a6;
  border-radius: 14px;
  pointer-events: none;
}

.closeLetter {
  position: absolute;
  top: 16px;
  right: 22px;
  cursor: pointer;
  font-size: 26px;
  color: #c94d76;
  transition: 0.3s ease;
  z-index: 3;
}

.closeLetter:hover {
  transform: rotate(90deg) scale(1.1);
}

.letter p {
  flex: 1;
  overflow-y: auto;
  margin: 0;
  font-size: 18px;
  line-height: 1.9;
  color: #4c3a35;
  text-align: justify !important;
  text-align-last: left;
  white-space: normal;
  transition: 0.25s ease;
  hyphens: auto;
  word-spacing: 1px;
}

.page-number {
  text-align: center;
  color: #b86a86;
  font-size: 14px;
  font-style: italic;
  margin-top: 16px;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.buttons {
  margin-top: auto;
  display: flex;
  justify-content: center;
  gap: 15px;
  padding-top: 10px;
}

button {
  border: none;
  background: #c94d76;
  color: white;
  padding: 10px 24px;
  border-radius: 25px;
  cursor: pointer;
  transition: 0.3s;
  font-size: 14px;
}

button:hover {
  background: #a93c60;
  transform: scale(1.06);
}

.note {
  margin-top: 25px;
  color: #9d3d5e;
}

.photo-popup {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.72);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 40;
  padding: 18px;
}

.photo-box {
  background: #fffaf2;
  padding: 14px;
  border-radius: 20px;
  position: relative;
  animation: pop 0.35s ease;
  max-width: 92vw;
  box-shadow: 0 20px 50px rgba(0,0,0,0.35);
  border: 2px solid #f0c7b5;
}

.photo-box img {
  max-width: 340px;
  max-height: 470px;
  border-radius: 16px;
  display: block;
  object-fit: contain;
}

#photoCaption{

    padding:15px;

    margin:0;

    background:white;

    font-size:15px;

    text-align:center;

    color:#b14f75;

}

.close {
  position: absolute;
  top: -12px;
  right: -12px;
  background: #c94d76;
  color: white;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: grid;
  place-items: center;
  cursor: pointer;
  font-weight: bold;
}

@keyframes pop {
  from { transform: scale(0.6); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@media screen and (max-width: 768px) {
  body {
    min-height: 100dvh;
    padding: 20px;
    overflow: hidden;
  }

  .main{
    width:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transform:none;
}
  .envelope{
    width:250px;
    height:165px;
    margin:auto;
}

  .envelope::before{
    top:50%;
    left:50%;
    transform:translate(-50%,-35%);
    font-size:32px;
}

  .flap {
    inset: 0 0 auto 0;
    width: 100%;
    height: 90px;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    border: none;
  }

  .front {
    height: 95px;
  }

  .letter {
    width: min(90vw, 430px);
    aspect-ratio: 1 / 1.414;
    height: auto;
    max-height: 80vh;
    padding: 34px 24px 70px;
    border-radius: 18px;
  }

  .letter p {
    flex: 1;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.55;
    text-align: justify !important;
    text-align-last: left;
    padding-right: 4px;
    hyphens: auto;
    word-spacing: 1px;
  }

  .page-number {
    font-size: 12px;
    margin-top: 8px;
    margin-bottom: 6px;
  }

  .buttons {
    gap: 10px;
    padding-top: 8px;
  }

  button {
    padding: 8px 18px;
    font-size: 13px;
  }

  .closeLetter {
    top: 12px;
    right: 17px;
    font-size: 23px;
  }

  .photo-box{

    position:relative;

    width:min(92vw,380px);

    border-radius:20px;

    overflow:hidden;

    background:white;

    animation:pop .35s ease;

    box-shadow:0 18px 45px rgba(0,0,0,.35);

}

  .photo-box img{

    display:block;

    width:100%;

    height:auto;

    aspect-ratio:3/4;

    object-fit:cover;

}

  #photoCaption {
    font-size: 14px;
  }

  .note {
    font-size: 14px;
    padding: 0 10px;
  }

  .flower:nth-child(1){font-size:40px;}
  .flower:nth-child(2){font-size:36px;}
  .flower:nth-child(3){font-size:38px;}
  .flower:nth-child(4){font-size:32px;}
  .flower:nth-child(5){font-size:34px;}
  .flower:nth-child(6){font-size:30px;}
}
</style>
</head>

<body>

<div class="overlay" onclick="closeLetter()"></div>

<div class="flower-bg">

    <!-- Memory Flower 1 -->
    <span class="flower"
        style="top:12%; left:18%; transform:rotate(-12deg);"
        onclick="showPhoto('IMG_20260608_183658_268.jpg',
        'One of my favorite memories with you ❤️')">
        🌸
    </span>

    <!-- Memory Flower 2 -->
    <span class="flower"
        style="top:28%; right:18%; transform:rotate(18deg);"
        onclick="showPhoto('IMG_20260621_204516_700.jpg',
        'Every moment with you makes me smile 🌷')">
        🌷
    </span>

    <!-- Memory Flower 3 -->
    <span class="flower"
        style="bottom:16%; left:24%; transform:rotate(-20deg);"
        onclick="showPhoto('IMG_20260624_165015_257.jpg',
        'I hope we make many more<br>memories together 🌹')">
        🌹
    </span>

    <!-- Decorative -->
    <span class="flower"
        style="top:8%; right:36%; transform:rotate(14deg);">
        💐
    </span>

    <span class="flower"
        style="bottom:10%; right:18%; transform:rotate(-15deg);">
        🌻
    </span>

    <span class="flower"
        style="top:60%; left:8%; transform:rotate(20deg);">
        🌺
    </span>

</div>

<div class="main">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="front"></div>
  </div>

  <p class="note">Click yung envelope tssk ano ako pa mag kiclick</p>
</div>

<div class="letter" onclick="event.stopPropagation()">
  <div class="paper-design"></div>
  <div class="closeLetter" onclick="closeLetter()">×</div>

  <p id="letterText"></p>

  <div class="page-number" id="pageNumber"> 1 / 4 </div>

  <div class="buttons">
    <button onclick="prevPage()">Back</button>
    <button onclick="nextPage()">Next</button>
  </div>
</div>

<div class="photo-popup" id="popup" onclick="closePhoto()">
  <div class="photo-box" onclick="event.stopPropagation()">
    <div class="close" onclick="closePhoto()">×</div>
    <img id="popupImg" src="" alt="photo" />
    <p id="photoCaption"></p>
  </div>
</div>

<script>
const envelope = document.querySelector(".envelope");
const letter = document.querySelector(".letter");
const overlay = document.querySelector(".overlay");
const main = document.querySelector(".main");
const flowerBg = document.querySelector(".flower-bg");
const letterText = document.getElementById("letterText");
const pageNumber = document.getElementById("pageNumber");

const pages = [
`&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;1st Day of July na ohhh HAHAHAHAHA, and ang bilis din talag ng panahon. Knowing you was so unexpected, but I really enjoy every moment na mas nakikilala kita. Lalo na yung mga gala natin, chikahan, kulitan, and of course every simple moments na di ko akalain magiging favorite memories ko.<br><br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;HAHAHAHA parang kailan lang medyo magulo pa tayo dahil sa may issue "you know who" nyahahahaha. Pero look at us now, super happy na hindi yun ang naging dahilan para mawala or maputol ang connection natin.`,

`&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;I also want to say sorry. Sorry if may times na nagiging awkward ako, makulit, sa mga nasabi ko and nagawang hindi maganda na di mo nagustuhan like may times na nagiging forceful ako, I really sorry talaga. And sorry din na nag confess ako biglaan nung una HAHAHAHAA. Sa totoo lang akala ko talaga lalayuan mo ako eh like ayun na yung last na connection natin.<br><br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Pero thank you sobraa. Thank you for staying. Thank you kasi hindi mo ako nilayuan. Thank you at sinupportahan mo ako sa thesis for always giving me courage na matatapos yan, and makaka graduate ka, thank you suuppeer. And thank you din dahil isa ka sa taong nag pasaya sakin this past few months.`,

`&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Arianne, I really like you, especially ngayon na mas nakilala na kita at mas patuloy pa kitang kinikilala. Honestly, habang mas nakakasama at nakikilala kita, mas lalong lumalalim yung feelings ko para sa'yo. HAHAHAHA.<br><br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Alam mo naman na hindi ako nandito para sa "jowa-jowa" lang. I'm here because I'm looking for a serious, long-term, and lasting relationship.<br><br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Hindi kita mamadaliin sa kahit anong nararamdaman mo. Take your time. Hindi ko ine-expect na kailangan mong suklian agad yung feelings ko ngayon. I just wanted to say this again because I want you to know kung gaano ako ka seryoso sayo.`,

`&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Promise ko sayo na I'll stay loyal to you, respect you, support you, and always treat you with the same love and respect kagaya kung pano ko tratuhin mama ko. I'll always do my best to make you feel valued, appreciated, and secure.<br><br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Marami pa tayo pag dadaan at di natin alam ang mang yayari in the future, Pero now Im supper thankful na nag kakilala tayo. You are my unexpected blessing na dumating sa buhayy ko this year.<br><br>
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Happy First Day of July. Hoping na nag enjoy kadin and hoping na mas marami pa tayong memories na magawa together. Thank you so much for being youuu.`
];

let currentPage = 0;
letterText.innerHTML = pages[currentPage];
pageNumber.textContent = `${currentPage + 1} / ${pages.length}`;

function openEnvelope() {
  envelope.classList.add("open");

  setTimeout(() => {
    letter.classList.add("show");
    overlay.classList.add("show");
    main.classList.add("dim");
    flowerBg.classList.add("dim");
  }, 450);
}

function closeLetter() {
  letter.classList.remove("show");
  overlay.classList.remove("show");
  main.classList.remove("dim");
  flowerBg.classList.remove("dim");

  setTimeout(() => {
    envelope.classList.remove("open");
  }, 400);
}

function updatePage() {
  letterText.style.opacity = 0;

  setTimeout(() => {
    letterText.innerHTML = pages[currentPage];
    pageNumber.textContent = `❀ ${currentPage + 1} / ${pages.length} ❀`;
    letterText.style.opacity = 1;
  }, 180);
}

function nextPage() {
  currentPage++;
  if (currentPage >= pages.length) currentPage = 0;
  updatePage();
}

function prevPage() {
  currentPage--;
  if (currentPage < 0) currentPage = pages.length - 1;
  updatePage();
}

function showPhoto(photoPath, caption) {
  document.getElementById("popupImg").src = photoPath;
  document.getElementById("photoCaption").innerHTML = caption;
  document.getElementById("popup").style.display = "flex";
}

function closePhoto() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
